    <meta charset="UTF-8">

    <link rel="stylesheet" href="./style.css">
    <script async src="./data.js"></script>
    <script async src="./index.js"></script>
</head>

<body onload="HtmlEvents.onPageLoad()">
    <main>
        <section id="hexagram-borad">
            <button type="button" id="hexagram-1" class="hexagram"></button>
            <button type="button" id="hexagram-2" class="hexagram"></button>
            <button type="button" id="hexagram-3" class="hexagram"></button>
            <button type="button" id="hexagram-4" class="hexagram"></button>
            <button type="button" id="hexagram-5" class="hexagram"></button>
            <button type="button" id="hexagram-6" class="hexagram"></button>
        </section>
        <section id="explain">
            <h1>乾</h1>
            <p>元亨，利貞。</p>
            <p><span
                    class="small-title">彖傳：</span>大哉乾元，萬物資始，乃統天。雲行雨施，品物流形。大明始終，六位時成，時乘六龍以御天。乾道變化，各正性命，保合大和，乃利貞。首出庶物，萬國咸寧。
            </p>
            <p><span class="small-title">象傳：</span>天行健，君子以自強不息。</p>
            <ul class="list-block">
                <li class="explain-list">
                    <span class="small-title">初九：</span>潛龍，勿用。
                </li>
                <li class="explain-list">
                    <span class="small-title">九二：</span>見龍在田，利見大人。
                </li>
                <li class="explain-list">
                    <span class="small-title">九三：</span>君子終日乾乾，夕惕若，厲，无咎。
                </li>
                <li class="explain-list">
                    <span class="small-title">九四：</span>或躍在淵，無咎。
                </li>
                <li class="explain-list">
                    <span class="small-title">九五：</span>飛龍在天，利見大人。
                </li>
                <li class="explain-list">
                    <span class="small-title">上九：</span>亢龍有悔。
                </li>
                <li class="explain-list">
                    <span class="small-title">用九：</span>見群龍無首，吉。
                </li>
            </ul>
        </section>
        <section id="website">
            <ul class="list-block">
                <li class="explain-list">
                    <a href="https://zh.wikipedia.org/wiki/%E4%B9%BE%E5%8D%A6" class="website-link">維基百科：乾卦</a>
                </li>
                <li class="explain-list">
                    <a href="https://ctext.org/book-of-changes/qian/zh" class="website-link">中國哲學書電子化計畫：乾卦</a>
                </li>
            </ul>
        </section>
    </main>
</body>

</html>
